name: Update & Deploy Dashboard

on:
  schedule:
    # Every 5 minutes (GitHub runs scheduled workflows only from the default
    # branch, and may delay them under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  push:
    # Any human push to main redeploys. The cron job's own data commits are
    # tagged "[skip ci]", so they refresh the data without triggering a loop.
    branches: [main]

# Allow the workflow to commit refreshed data, deploy to GitHub Pages, and
# (once the tournament is over) disable its own schedule.
permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

# Serialize runs but let in-flight Pages deployments finish (cancelling a
# deploy mid-flight can leave the published site in a bad state).
concurrency:
  group: "wc-dashboard"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest World Cup data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "wc-dashboard-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update World Cup data [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Runs only after a successful deploy, so the final results are published
  # before the recurring schedule is turned off.
  finalize:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Stop the schedule once the World Cup is over
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          result="$(python scripts/tournament_over.py)"
          echo "$result"
          if [ "${result%%:*}" = "STOP" ]; then
            echo "World Cup complete — disabling the scheduled workflow."
            curl -sS -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/update.yml/disable"
          fi
