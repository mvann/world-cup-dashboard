name: Update & Deploy Dashboard

on:
  schedule:
    # Every 10 minutes. Note: GitHub only runs scheduled workflows from the
    # repository's DEFAULT branch.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
  push:
    # Any human push to main redeploys. The cron job's own data commits are
    # tagged "[skip ci]", so they refresh the data without triggering a loop.
    branches: [main]

# Allow the workflow to commit refreshed data and deploy to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Avoid overlapping scheduled runs; let the newest win.
concurrency:
  group: "wc-dashboard"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest World Cup data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "wc-dashboard-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update World Cup data [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
