name: Update & Deploy Dashboard

on:
  schedule:
    # Every 5 minutes (GitHub runs scheduled workflows only from the default
    # branch, and may delay them under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  push:
    # Any human push to main redeploys. The cron job's own data commits are
    # tagged "[skip ci]", so they refresh the data without triggering a loop.
    branches: [main]

# Allow the workflow to commit refreshed data, deploy to GitHub Pages, and
# (once the tournament is over) disable its own schedule.
permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

# Serialize runs but let in-flight Pages deployments finish (cancelling a
# deploy mid-flight can leave the published site in a bad state).
concurrency:
  group: "wc-dashboard"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.commit.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest World Cup data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "wc-dashboard-bot"
          git config user.email "actions@github.com"
          git add data/
          # meta.json's timestamp changes every run, so decide whether to redeploy
          # based on the real data (standings + matches) only.
          if git diff --cached --quiet -- data/standings.json data/matches.json; then
            data_changed=0
          else
            data_changed=1
          fi
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update World Cup data [skip ci]"
            # Rebase onto anything that landed mid-run (e.g. a human push) so the
            # push can't fail on a non-fast-forward.
            git pull --rebase --autostash origin main
            git push
          fi
          # Deploy when the real data changed, or when a human push / manual run
          # triggered us; skip redeploying on a quiet scheduled run.
          if [ "$data_changed" = "1" ] || [ "${{ github.event_name }}" != "schedule" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled run with no data change — skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: ${{ steps.commit.outputs.deploy == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: ${{ needs.build.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Runs only after a successful deploy, so the final results are published
  # before the recurring schedule is turned off.
  finalize:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Stop the schedule once the World Cup is over
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          result="$(python scripts/tournament_over.py)"
          echo "$result"
          if [ "${result%%:*}" = "STOP" ]; then
            echo "World Cup complete — disabling the scheduled workflow."
            curl -sS -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/update.yml/disable"
          fi
