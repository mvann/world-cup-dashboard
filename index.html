<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Cup 2026 Dashboard</title>
  <meta name="description" content="Live World Cup 2026 group standings, schedule and knockout bracket." />
  <meta name="theme-color" content="#F19F1D" />
  <meta name="color-scheme" content="light" />
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/favicon.png" />
  <link rel="preconnect" href="https://crests.football-data.org" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="./assets/style.css?v=3" />
</head>
<body>
  <header class="site-header">
    <div class="title-wrap">
      <h1 id="comp-title">World Cup <span class="title-year">2026</span></h1>
    </div>
    <div id="live-bar" class="live-bar" aria-label="Live matches"></div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Dashboard sections">
    <button class="tab active" role="tab" data-tab="standings" aria-selected="true">Groups</button>
    <button class="tab" role="tab" data-tab="schedule" aria-selected="false">Calendar</button>
    <button class="tab" role="tab" data-tab="bracket" aria-selected="false">Bracket</button>
    <div class="status">
      <span id="live-dot" class="dot" aria-hidden="true"></span>
      <span id="updated-label">Loading…</span>
    </div>
  </nav>

  <main>
    <section id="tab-standings" class="tab-panel active" role="tabpanel">
      <div id="standings" class="groups-grid"></div>
    </section>

    <section id="tab-schedule" class="tab-panel" role="tabpanel">
      <div class="schedule-controls">
        <div class="filter-chips" id="schedule-filters"></div>
      </div>
      <div id="schedule" class="schedule"></div>
    </section>

    <section id="tab-bracket" class="tab-panel" role="tabpanel">
      <div id="bracket" class="bracket"></div>
    </section>

    <section id="detail-view"></section>
  </main>

  <footer class="site-footer">
    <span id="footer-note"></span>
    <span class="sep">·</span>
    <span>Data: <a href="https://www.football-data.org/" rel="noopener" target="_blank">football-data.org</a></span>
  </footer>

  <script src="./assets/app.js?v=3"></script>
</body>
</html>
